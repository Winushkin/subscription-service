version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: subscriptions_postgres
    env_file:
      - ../configs/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: server
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../configs/.env
    ports:
      - "8080:8080"

volumes:
  postgres_data: